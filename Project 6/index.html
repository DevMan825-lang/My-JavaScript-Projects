<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            position: absolute;
            top:50%; 
            left:50%; 
            transform: translate(-50%,-50%);
            background-color: hsl(0,0%,94%);
        }
        .container{
            width: 400px; 
            height: 300px; 
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.20);
            cursor: pointer;
        }
        textarea{
            width:300px; 
            height:100px; 
            border:2px solid #e9186b; 
            margin-top: 20px;
            margin-left: 40px;
            cursor: pointer;

        }
        textarea:focus{
            outline:none; 
        }
        button{
            width: 80px; 
            height:28px; 
            background-color: #fff;
            margin-left: 40px;
            margin-top: 12px;
            border:2px solid #e9186b;
             cursor: pointer;

        }
        h2{
            text-align: center;
            font-family: monospace;
        }
        h3{
            text-align: center;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <br><br>
        <h2>Character Counter</h2>
    <textarea name="message" id="message"></textarea>
    <br>
    <button onclick="myFunction()">count</button>
    <br>
    <h3 id="count"></h3>
    </div>

    <script src="main.js"></script>
</body>
</html>
