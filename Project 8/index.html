<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height:100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color:hsl(0, 9%, 89%); 
        }
        .container{
            width: 450px; 
            min-height: 150px; 
            background-color: #fff;
            box-shadow: 0 4x 8px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.20);
            border-radius: 4px;
        }
        input[type="text"]{
            width: 350px; 
            height:34px; 
            border:2px solid #000; 
            text-align: center;
            border-radius: 4px;
            margin-top: 40px; 
            margin-left: 32px;
            text-transform: capitalize;
        }
        button{
            width: 70px; 
            height: 32px; 
            border-radius: 4px; 
            border:none; 
            background-color: #ec1648;
            color:#fff;
            margin-left: 32px;

        }
        .mybtn{
            background-color: #f6e6e6;
            color:#000;
            margin-left: 10px;
        }
        h3{
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <!-- Palindrome Checker -->
     <!-- level, mamdam, mam, mom.....  -->
      <div class="container">
        <input type="text" id="text"/>
        <br><br>
        <button onclick="check()">Check</button>
        <button onclick="cancel()" class="mybtn">Cancel</button>
        <br><br>
        <h3 id="demo"></h3>
      </div>
    <script src="main.js"></script>
</body>
</html>
