<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            position:absolute; 
            top:50%; 
            left:50%; 
            transform: translate(-50%, -50%);
            background-color: #3f3939;

        }
        .container{
            width: 400px; 
            height:400px; 
            background-color: #000;
            color:#fff; 
            border-radius:4px; 
            /* display:flex; 
            flex-direction: column;
            align-items:center;  */
        }
        #age,#citizenIn,#registeredIn, label, button{
            margin-left:50px; 
        }
        .child-container{
            padding-top:50px; 
        }
         #age,#citizenIn,#registeredIn{
            width: 250px; 
            height:35px; 
            background-color: #000;
            border:2px solid #fff; 
            border-radius:4px; 
            color:#fff; 
            text-align:center; 
         }
         label{
            font-size:20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         }
         button{
            width: 250px; 
            height:35px; 
            background-color: #e0a029;
            border:none; 
            border-radius: 4px;
            color:#fff; 
         }
         h3{
            margin-left:50px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         }
         legend{
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

         }
    </style>
</head>
<body>
    <fieldset class="container">
        <legend>Voter Eligibility Criteria Checker</legend>
            <div class="child-container">
        <label for="Age">Enter your age : </label> <br>
        <input type="number" name="age" id="age"/> <br> <br>
       
       
        <label for="citizen">Citizen of this country (yes / No) : </label> <br>
        <input list="citizen" name="citizen" id="citizenIn">
        <datalist id="citizen">
        <option value="Yes"></option>
        <option value="No"></option> <br><br>
       </datalist>
       <br><br>

        <label for="registered">Registered to vote (yes / No) : </label> <br>
        <input list="registered" name="registered" id="registeredIn">
        <datalist id="registered">
        <option value="Yes"></option>
        <option value="No"></option> <br><br>
        </datalist>
        <br><br>

        <button onclick="check()">Submit</button>
        <br> 
        <h3></h3>
        </div>
    </fieldset>

    <script src="main.js"></script>
</body>
</html>
